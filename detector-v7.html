<body>
<main class="app">
<section class="shell">
<div class="screen tight-v7">
<header class="topbar">

<section class="hero hero-v7">
<h1>Проверить текст</h1>
<p class="sub">Вставь фразу и посмотри где давление</p>
</section>

<section class="main detector-main-v7">
<div class="toolbox v7detector">
<textarea id="input" placeholder="Например: Только сегодня, не упусти шанс"></textarea>
<div class="feedback" id="feedback"></div>
<div class="example-row">
<button class="example-chip" onclick="setExample('fear')">страх</button>
<button class="example-chip" onclick="setExample('urgency')">срочность</button>
</div>
<button class="cta" onclick="analyze()">Проверить</button>
<div class="feedback" id="result"></div>
</div>

<script>
function setExample(type){
const input=document.getElementById('input');
if(type==='fear')input.value='Вы потеряете результат если не сделаете сейчас';
if(type==='urgency')input.value='Только сегодня, осталось 2 места';
}
function analyze(){
const text=document.getElementById('input').value;
const result=document.getElementById('result');
if(!text){result.innerText='вставь текст';return}
if(text.includes('сегодня')||text.includes('сейчас')){
result.innerText='срочность';return}
if(text.includes('потеря')||text.includes('не сделаете')){
result.innerText='страх';return}
result.innerText='явного давления нет';
}
</script>
