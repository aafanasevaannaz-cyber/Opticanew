<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Opticanew</title>
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/components.css" />
  <link rel="stylesheet" href="./styles/detector.css" />
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="screen">
        <header class="topbar">
          <div class="brand">
            <div class="dot"></div>
            <b id="brandName">OPTICANEW</b>
          </div>
          <a class="ghost" href="#" id="telegramLabel">telegram ↗</a>
        </header>

        <section class="hero">
          <div class="eyebrow" id="heroEyebrow">скрытое давление</div>
          <h1 id="heroTitle">Увидеть, как на тебя давят текстом</h1>
          <p class="sub" id="heroSubtitle"></p>
        </section>

        <section class="main">
          <div class="lens-card">
            <div class="lens"></div>
            <div class="lens-line"></div>
            <div class="floating">
              <small>линза давления</small>
              <b id="floatTitle">Ничего не найдено</b>
              <div class="pills" id="floatPills"></div>
            </div>
          </div>

          <div class="toolbox home-toolbox">
            <div class="pills" id="signals"></div>
            <div class="field" id="demoText"></div>
            <div class="button-row">
              <a class="cta" href="./detector.html" id="primaryCta">Проверить текст</a>
              <a class="ghost-button" href="#" id="secondaryCta">Разобрать пример</a>
            </div>
            <div class="entry-grid" id="entryCards"></div>
          </div>
        </section>

        <div></div>
      </div>
    </section>
  </main>

  <script type="module" src="./scripts/render-home.js"></script>
</body>
</html>
